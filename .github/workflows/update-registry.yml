name: Update Registry

on:
  schedule:
    - cron: '0 8 * * *' # Run daily at 08:00 UTC
  release:
    types: [published]
  workflow_dispatch:      # Allow manual trigger

concurrency:
  group: update-registry
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

env:
  GO_VERSION: '1.26.2'

jobs:
  update-registry:
    name: Update Image Registry
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          
      - name: Install dependencies
        run: go mod download

      - name: Run Registry Builder
        id: builder
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Run builder and capture output to a file
          output_file="$(mktemp)"
          go run cmd/registry-builder/main.go --sources registry/sources.yaml --output registry/images.json > "$output_file"
          cat "$output_file"
          
          # Extract images to validate
          images=$(grep "VALIDATE:" "$output_file" | cut -d' ' -f2 | tr '\n' ',' | sed 's/,$//' || true)
          echo "to_validate=$images" >> $GITHUB_OUTPUT

      - name: Validate New Images
        if: steps.builder.outputs.to_validate != ''
        run: |
          IFS=',' read -ra ADDR <<< "${{ steps.builder.outputs.to_validate }}"
          for i in "${ADDR[@]}"; do
            echo "🐣 Validating new image: $i"
            # Extract just the image name component for the filter (e.g., 'alpine' from 'alpine:3.21')
            filter=$(echo $i | cut -d':' -f1)
            ./bin/validate-registry.sh registry/images.json "$filter"
          done

      - name: Check for changes
        id: check_changes
        run: |
          if git diff --quiet -- registry/images.json; then
            echo "No changes detected."
            echo "changes=false" >> $GITHUB_OUTPUT
          else
            echo "Registry updated!"
            echo "changes=true" >> $GITHUB_OUTPUT
            # Show diff for logs
            git diff registry/images.json
          fi

      - name: Enforce registry diff allowlist
        if: steps.check_changes.outputs.changes == 'true'
        run: |
          mapfile -t changed_files < <(git diff --name-only)
          if [ "${#changed_files[@]}" -ne 1 ] || [ "${changed_files[0]}" != "registry/images.json" ]; then
            echo "Unexpected modified files detected:"
            printf ' - %s\n' "${changed_files[@]}"
            exit 1
          fi

      - name: Create Pull Request
        id: cpr
        if: steps.check_changes.outputs.changes == 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.NIDO_BOT_TOKEN || secrets.GITHUB_TOKEN }}
          commit-message: "fix(registry): update image catalog"
          title: "🤖 Registry Update: New Images Detected & Validated"
          body: |
            This PR updates `registry/images.json` with the latest data from upstream providers.
            
            **Verification:**
            - Registry generation completed successfully.
            - Hosted GitHub runners perform structural validation and skip VM boot checks when KVM is unavailable.
            - Missing checksum metadata is reported by the validator and must be reviewed before treating images as cryptographically verified.
            - Full SSH lifecycle validation requires a Linux runner with KVM access.
            
            *Auto-generated by Nido Registry Builder.*
          branch: "update-registry"
          base: "main"
          add-paths: |
            registry/images.json
          delete-branch: true

      - name: Verify PR file scope
        if: steps.cpr.outputs.pull-request-number
        env:
          GITHUB_TOKEN: ${{ secrets.NIDO_BOT_TOKEN }}
        run: |
          gh pr diff ${{ steps.cpr.outputs.pull-request-number }} --name-only > pr_files.txt
          if [ "$(wc -l < pr_files.txt)" -ne 1 ] || ! grep -qx 'registry/images.json' pr_files.txt; then
            echo "Registry bot PR touched unexpected files:"
            cat pr_files.txt
            exit 1
          fi

      - name: Enable Auto-Merge
        if: steps.cpr.outputs.pull-request-number
        env:
          GITHUB_TOKEN: ${{ secrets.NIDO_BOT_TOKEN }}
        run: gh pr merge ${{ steps.cpr.outputs.pull-request-number }} --auto --squash --delete-branch
