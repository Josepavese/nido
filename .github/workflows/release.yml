name: Create Release

on:
  push:
    tags:
      - 'v*'  # Trigger on version tags like v3.0.0
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build (e.g., v4.4.1)'
        required: true

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      id-token: write
    env:
      GO_VERSION: '1.26.2'
      MCP_PUBLISHER_VERSION: 'v1.7.8'
      MCP_PUBLISHER_SHA256: '48230dbec85bd88a0d42977ef533cddda23235f0db4331b9263ce53b432cb75c'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0  # Full history for changelog

      - name: Determine Version
        id: versioning
        env:
          DISPATCH_VERSION: ${{ github.event.inputs.version }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION_INPUT="$DISPATCH_VERSION"
          else
            VERSION_INPUT="${GITHUB_REF#refs/tags/}"
          fi
          if [[ ! "$VERSION_INPUT" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid release version: $VERSION_INPUT"
            echo "Expected format: vX.Y.Z"
            exit 1
          fi
          echo "VERSION=$VERSION_INPUT" >> "$GITHUB_ENV"
          echo "version=$VERSION_INPUT" >> "$GITHUB_OUTPUT"

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Install release packaging tools
        run: |
          for attempt in 1 2 3; do
            if sudo apt-get update && sudo apt-get install -y jq zip; then
              exit 0
            fi
            echo "APT install attempt ${attempt} failed; retrying..."
            sleep $((attempt * 10))
          done
          exit 1

      - name: Build release binaries
        run: |
          bash bin/build-release.sh ${{ env.VERSION }}

      - name: Generate release notes
        id: release_notes
        run: |
          # Use version from environment
          TAG=${{ env.VERSION }}
          REV="$TAG"
          if ! git rev-parse --verify "$TAG^{commit}" >/dev/null 2>&1; then
            REV="HEAD"
          fi
          
          # Get previous tag
          PREV_TAG=$(git describe --tags --abbrev=0 "$REV^" 2>/dev/null || echo "")
          
          # Determine if this is a major/minor/patch release
          if [[ $TAG =~ v([0-9]+)\.([0-9]+)\.([0-9]+) ]]; then
            MAJOR=${BASH_REMATCH[1]}
            MINOR=${BASH_REMATCH[2]}
            PATCH=${BASH_REMATCH[3]}
          fi
          
          # Generate witty intro based on version type
          if [ "$PATCH" = "0" ] && [ "$MINOR" = "0" ]; then
            INTRO="🎉 **Major Release Alert!** The bird has evolved significantly. This is a big one, folks."
          elif [ "$PATCH" = "0" ]; then
            INTRO="🐣 **New Features Hatched!** The nest got some shiny new additions."
          else
            INTRO="🔧 **Maintenance Release** - Bug fixes and polish. Even birds need grooming."
          fi
          
          # Generate changelog with categorization
          if [ -z "$PREV_TAG" ]; then
            COMMITS=$(git log --pretty=format:"%s|||%h" "$REV")
            CHANGELOG_URL="https://github.com/Josepavese/nido/commits/$TAG"
          else
            COMMITS=$(git log --pretty=format:"%s|||%h" "$PREV_TAG..$REV")
            CHANGELOG_URL="https://github.com/Josepavese/nido/compare/$PREV_TAG...$TAG"
          fi
          
          # Categorize commits
          FEATURES=""
          FIXES=""
          DOCS=""
          CHORES=""
          TESTS=""
          CI=""
          
          while IFS='|||' read -r msg hash; do
            if [[ $msg =~ ^feat ]]; then
              FEATURES="${FEATURES}\n* ${msg#feat: } (\`${hash}\`)"
            elif [[ $msg =~ ^fix ]]; then
              FIXES="${FIXES}\n* ${msg#fix: } (\`${hash}\`)"
            elif [[ $msg =~ ^docs ]]; then
              DOCS="${DOCS}\n* ${msg#docs: } (\`${hash}\`)"
            elif [[ $msg =~ ^test ]]; then
              TESTS="${TESTS}\n* ${msg#test: } (\`${hash}\`)"
            elif [[ $msg =~ ^ci ]]; then
              CI="${CI}\n* ${msg#ci: } (\`${hash}\`)"
            elif [[ $msg =~ ^chore ]]; then
              CHORES="${CHORES}\n* ${msg#chore: } (\`${hash}\`)"
            else
              CHORES="${CHORES}\n* ${msg} (\`${hash}\`)"
            fi
          done <<< "$COMMITS"
          
          # Create release notes with Nido personality
          cat > release_notes.md << EOF
          ## 🪺 Nido $TAG
          
          $INTRO
          
          EOF
          
          # Add sections only if they have content
          if [ -n "$FEATURES" ]; then
            cat >> release_notes.md << EOF
          ### ✨ New Features
          
          The bird learned some new tricks:
          $(echo -e "$FEATURES")
          
          EOF
          fi
          
          if [ -n "$FIXES" ]; then
            cat >> release_notes.md << EOF
          ### 🐛 Bug Fixes
          
          Squashed these pesky bugs (they were bothering the VMs):
          $(echo -e "$FIXES")
          
          EOF
          fi
          
          if [ -n "$DOCS" ]; then
            cat >> release_notes.md << EOF
          ### 📚 Documentation
          
          Made the docs more readable (and funnier):
          $(echo -e "$DOCS")
          
          EOF
          fi
          
          if [ -n "$CI" ]; then
            cat >> release_notes.md << EOF
          ### 🤖 CI/CD
          
          Robot improvements (the machines are getting smarter):
          $(echo -e "$CI")
          
          EOF
          fi
          
          if [ -n "$TESTS" ]; then
            cat >> release_notes.md << EOF
          ### 🧪 Tests
          
          More tests = more confidence:
          $(echo -e "$TESTS")
          
          EOF
          fi
          
          if [ -n "$CHORES" ]; then
            cat >> release_notes.md << EOF
          ### 🧹 Housekeeping
          
          The boring but necessary stuff:
          $(echo -e "$CHORES")
          
          EOF
          fi
          
          # Add installation instructions
          cat >> release_notes.md << EOF
          ---
          
          ### 📦 Installation
          
          Pick your platform and get hatching:

          #### Quick install
          \`\`\`bash
          curl -fsSL https://github.com/Josepavese/nido/releases/download/$TAG/install.sh | bash
          \`\`\`

          \`\`\`powershell
          irm https://github.com/Josepavese/nido/releases/download/$TAG/install.ps1 | iex
          \`\`\`
          
          #### Linux
          \`\`\`bash
          curl -L https://github.com/Josepavese/nido/releases/download/$TAG/nido-linux-amd64.tar.gz -o nido.tar.gz
          tar -xzf nido.tar.gz
          cd nido-linux-amd64
          chmod +x nido
          sudo mv nido /usr/local/bin/
          nido version  # Should show $TAG
          \`\`\`

          #### Linux (ARM64)
          \`\`\`bash
          curl -L https://github.com/Josepavese/nido/releases/download/$TAG/nido-linux-arm64.tar.gz -o nido.tar.gz
          tar -xzf nido.tar.gz
          cd nido-linux-arm64
          chmod +x nido
          sudo mv nido /usr/local/bin/
          \`\`\`
          
          #### macOS (Intel)
          \`\`\`bash
          curl -L https://github.com/Josepavese/nido/releases/download/$TAG/nido-darwin-amd64.tar.gz -o nido.tar.gz
          tar -xzf nido.tar.gz
          cd nido-darwin-amd64
          chmod +x nido
          sudo mv nido /usr/local/bin/
          \`\`\`
          
          #### macOS (Apple Silicon)
          \`\`\`bash
          curl -L https://github.com/Josepavese/nido/releases/download/$TAG/nido-darwin-arm64.tar.gz -o nido.tar.gz
          tar -xzf nido.tar.gz
          cd nido-darwin-arm64
          chmod +x nido
          sudo mv nido /usr/local/bin/
          \`\`\`
          
          #### Windows
          Download \`nido-windows-amd64.zip\` from the assets below, extract, and add the folder to your PATH.
          
          ---
          
          ### 🔗 Links
          
          * **Full Changelog:** $CHANGELOG_URL
          * **Documentation:** https://github.com/Josepavese/nido#readme
          * **Issues:** https://github.com/Josepavese/nido/issues
          
          ---
          
          <p align="center">
            <i>Made with ❤️ for the Agentic future.</i><br>
            <i>"It's not a VM, it's a lifestyle."</i> 🪺
          </p>
          EOF

      - name: Verify dist contents
        run: |
          ls -R dist/
          bash bin/verify-release.sh --local dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ env.VERSION }}
          body_path: release_notes.md
          files: |
            dist/nido-linux-amd64.tar.gz
            dist/nido-linux-arm64.tar.gz
            dist/nido-darwin-amd64.tar.gz
            dist/nido-darwin-arm64.tar.gz
            dist/nido-windows-amd64.zip
            dist/nido.mcpb
            dist/server.json
            dist/install.sh
            dist/install.ps1
            dist/SHA256SUMS
          draft: false
          prerelease: false
          generate_release_notes: true
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Promote Flavour Assets
        run: |
          # Get current tag
          TAG=${{ env.VERSION }}
          REV="$TAG"
          if ! git rev-parse --verify "$TAG^{commit}" >/dev/null 2>&1; then
            REV="HEAD"
          fi
          # Get previous tag
          PREV_TAG=$(git describe --tags --abbrev=0 "$REV^" 2>/dev/null || echo "")
          
          if [ -n "$PREV_TAG" ]; then
            echo "🛸 Promoting flavour assets from $PREV_TAG to $TAG..."
            bash bin/promote-assets.sh "$PREV_TAG" "$TAG"
          else
            echo "ℹ️ No previous tag found. Skipping asset promotion."
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install mcp-publisher
        run: |
          echo "📥 Installing mcp-publisher..."
          curl -fsSL --retry 3 --retry-delay 5 -o mcp-publisher.tar.gz "https://github.com/modelcontextprotocol/registry/releases/download/${MCP_PUBLISHER_VERSION}/mcp-publisher_linux_amd64.tar.gz"
          echo "${MCP_PUBLISHER_SHA256}  mcp-publisher.tar.gz" | sha256sum -c -
          tar -xzf mcp-publisher.tar.gz
          chmod +x mcp-publisher
          sudo mv mcp-publisher /usr/local/bin/
          mcp-publisher --version

      - name: Publish to MCP Registry
        run: |
          echo "🚀 Publishing to MCP Registry..."
          
          # Prepare server.json in CWD
          cp dist/server.json .
          
          # Login via OIDC
          mcp-publisher login github-oidc
          
          # Publish to Official Registry
          mcp-publisher publish --yes
