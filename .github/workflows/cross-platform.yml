name: Cross-Platform CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

permissions:
  contents: read

concurrency:
  group: cross-platform-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: '1.26.2'

jobs:
  test:
    name: Build and unit test on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Prefer LF checkout on Windows
        if: runner.os == 'Windows'
        run: git config --global core.autocrlf false

      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Build Nido & Validator
        shell: bash
        run: |
          suffix=""
          if [ "$RUNNER_OS" = "Windows" ]; then
            suffix=".exe"
          fi
          go build -o "nido${suffix}" ./cmd/nido
          go build -o "nido-validator${suffix}" ./cmd/nido-validator

      - name: Check Go formatting
        shell: bash
        run: |
          files=""
          while IFS= read -r file; do
            formatted="$(gofmt -l "$file")"
            if [ -n "$formatted" ]; then
              files="${files}${formatted}"$'\n'
            fi
          done < <(git ls-files '*.go')
          if [ -n "$files" ]; then
            echo "Go files require gofmt:"
            echo "$files"
            exit 1
          fi

      - name: Run unit tests
        run: go test -v -count=1 ./...

      - name: Run go vet
        run: go vet ./...

      - name: Run staticcheck
        if: runner.os == 'Linux'
        run: |
          go install honnef.co/go/tools/cmd/staticcheck@latest
          "$(go env GOPATH)/bin/staticcheck" ./...

      - name: Run govulncheck
        if: runner.os == 'Linux'
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          "$(go env GOPATH)/bin/govulncheck" ./...

      - name: Check obvious secret patterns
        if: runner.os == 'Linux'
        run: |
          if rg -n "(AKIA[0-9A-Z]{16}|ghp_[A-Za-z0-9_]{36,}|github_pat_|BEGIN (RSA|OPENSSH|EC|DSA) PRIVATE KEY|PRIVATE KEY|api[_-]?key|secret[[:space:]]*=|token[[:space:]]*=)" \
            --glob '!.secret' \
            --glob '!go.sum' \
            --glob '!dist/**' \
            --glob '!resources/**' \
            --glob '!*.png'; then
            echo "Potential secret material found."
            exit 1
          fi

      - name: Validate shell scripts
        if: runner.os == 'Linux'
        run: |
          for attempt in 1 2 3; do
            if sudo apt-get update && sudo apt-get install -y shellcheck; then
              break
            fi
            if [ "$attempt" = 3 ]; then
              exit 1
            fi
            sleep $((attempt * 10))
          done
          shellcheck -S error bin/*.sh bin/housekeeping/*.sh installers/*.sh manual_verify_gpu.sh restore_gpu.sh run_test.sh tools/nido-init/nido-init.sh

      - name: Validate PowerShell installer syntax
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          [scriptblock]::Create((Get-Content -Raw installers/quick-install.ps1)) | Out-Null

      - name: Capture doctor diagnostics
        shell: bash
        run: |
          suffix=""
          if [ "$RUNNER_OS" = "Windows" ]; then
            suffix=".exe"
          fi
          "./nido${suffix}" doctor --json

      - name: Exercise non-VM CLI commands
        shell: bash
        run: |
          suffix=""
          if [ "$RUNNER_OS" = "Windows" ]; then
            suffix=".exe"
          fi
          "./nido${suffix}" version
          "./nido${suffix}" config || true
          "./nido${suffix}" template list || true

  vm-smoke-linux:
    name: Linux VM smoke test
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Install QEMU and ISO tools
        run: |
          for attempt in 1 2 3; do
            if sudo apt-get update && sudo apt-get install -y qemu-system-x86 qemu-utils cloud-utils genisoimage; then
              exit 0
            fi
            echo "APT install attempt ${attempt} failed; retrying..."
            sleep $((attempt * 10))
          done
          exit 1

      - name: Verify runtime dependencies
        run: |
          qemu-system-x86_64 --version
          qemu-img --version
          if command -v cloud-localds >/dev/null 2>&1; then
            cloud-localds --version || true
          elif command -v genisoimage >/dev/null 2>&1; then
            genisoimage --version
          else
            echo "Missing cloud-init ISO creation tool"
            exit 1
          fi

      - name: Build Nido & Validator
        run: |
          go build -o nido ./cmd/nido
          go build -o nido-validator ./cmd/nido-validator

      - name: Run doctor
        run: ./nido doctor --json

      - name: Full VM lifecycle test (Linux only)
        run: |
          cleanup() {
            ./nido-validator --nido-bin ./nido --scenario cleanup || true
          }
          trap cleanup EXIT
          ./nido-validator --nido-bin ./nido --allow-doctor-fail

      - name: Validator artifact cleanup (Linux only)
        if: always()
        run: ./nido-validator --nido-bin ./nido --scenario cleanup || true

      - name: Capture validator fleet state (Linux only)
        if: always()
        run: |
          if ! ./nido ls --json > /tmp/nido_ls.json; then
            echo "nido ls --json failed"
            ./nido ls --json || true
            exit 1
          fi
          if ! ./nido template list --json > /tmp/nido_templates.json; then
            echo "nido template list --json failed"
            ./nido template list --json || true
            exit 1
          fi
          cat /tmp/nido_ls.json
          cat /tmp/nido_templates.json

      - name: Assert no residual validator VMs (Linux only)
        if: always()
        run: |
          python3 - <<'PY'
          import json, sys
          data = open("/tmp/nido_ls.json", "r", encoding="utf-8").read()
          try:
            payload = json.loads(data)
          except json.JSONDecodeError:
            print("Invalid JSON from nido ls --json:", data, file=sys.stderr)
            raise
          names = [vm.get("name", "") for vm in payload.get("data", {}).get("vms", [])]
          leaked = [name for name in names if name.startswith(("val-", "cli-val-", "vm_template_src", "vm_from_template"))]
          if leaked:
            print("Residual validator VMs found:", ", ".join(leaked), file=sys.stderr)
            sys.exit(1)
          PY

      - name: Assert no residual validator templates (Linux only)
        if: always()
        run: |
          python3 - <<'PY'
          import json, sys
          data = open("/tmp/nido_templates.json", "r", encoding="utf-8").read()
          try:
            payload = json.loads(data)
          except json.JSONDecodeError:
            print("Invalid JSON from nido template list --json:", data, file=sys.stderr)
            raise
          names = payload.get("data", {}).get("templates") or []
          leaked = [name for name in names if isinstance(name, str) and name.startswith("tpl_primary")]
          if leaked:
            print("Residual validator templates found:", ", ".join(leaked), file=sys.stderr)
            sys.exit(1)
          PY

  build-binaries:
    name: Build release binaries
    runs-on: ubuntu-latest
    needs: [test, vm-smoke-linux]
    timeout-minutes: 20
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Install release packaging tools
        run: |
          for attempt in 1 2 3; do
            if sudo apt-get update && sudo apt-get install -y jq zip; then
              exit 0
            fi
            echo "APT install attempt ${attempt} failed; retrying..."
            sleep $((attempt * 10))
          done
          exit 1

      - name: Build release archives
        run: bash bin/build-release.sh ci-snapshot

      - name: Validate release archives
        run: bash bin/verify-release.sh --local dist

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: nido-binaries
          path: dist/*
