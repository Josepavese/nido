name: windows-server-2022-core-eval
display_name: "Windows Server 2022 Evaluation (Server Core)"
description: "Windows Server 2022 Evaluation (180 Days). Minimal official Windows Server Core image."
version: "1.0.0"
ssh_user: "vmuser"
ssh_password: "nido"

# Microsoft Evaluation Center permalink (Windows Server 2022, English US, 64-bit).
iso_url: "https://go.microsoft.com/fwlink/p/?LinkID=2195280&clcid=0x409&culture=en-us&country=US"
iso_name: "windows-server-2022-core-eval.iso"
iso_checksum: ""

# VirtIO drivers for Windows.
drivers:
  - name: "virtio-win.iso"
    url: "https://fedorapeople.org/groups/virt/virtio-win/direct-downloads/stable-virtio/virtio-win.iso"
    checksum: ""

variables:
  windows_driver_profile: "2k22"
  windows_image_index: "1"

build_specs:
  cpu: 2
  memory: "2G"
  disk: "40G"
  timeout: "1h"

output_image: "windows-server-2022-core.qcow2"
output_size: "40G"

scripts:
  autounattend.xml: "@shared/windows-autounattend.xml"
