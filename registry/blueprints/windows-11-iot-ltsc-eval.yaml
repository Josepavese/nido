name: windows-11-iot-ltsc-eval
display_name: "Windows 11 IoT Enterprise LTSC 2024 Evaluation"
description: "Windows 11 IoT Enterprise LTSC 2024 Evaluation (90 Days). Lightweight Windows evaluation image."
version: "1.0.0"
ssh_user: "vmuser"
ssh_password: "nido"

# Microsoft Evaluation Center permalink (IoT Enterprise LTSC 2024, English US, 64-bit).
iso_url: "https://go.microsoft.com/fwlink/?linkid=2288085&clcid=0x409&culture=en-us&country=us"
iso_name: "windows-11-iot-ltsc-eval.iso"
iso_checksum: ""

# VirtIO drivers for Windows.
drivers:
  - name: "virtio-win.iso"
    url: "https://fedorapeople.org/groups/virt/virtio-win/direct-downloads/stable-virtio/virtio-win.iso"
    checksum: ""

variables:
  windows_driver_profile: "w11"
  windows_image_index: "1"

build_specs:
  cpu: 2
  memory: "2G"
  disk: "40G"
  timeout: "1h"

output_image: "windows-11-iot-ltsc.qcow2"
output_size: "40G"

scripts:
  autounattend.xml: "@shared/windows-autounattend.xml"
